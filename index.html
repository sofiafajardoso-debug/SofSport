<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login SofSport</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f6fa;
font-family:'Segoe UI';
}

/* CAJA */
.box{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:center;
width:300px;
}

/* LOGO */
.logo{
width:90px;
border-radius:50%;
margin-bottom:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* INPUTS */
input{
display:block;
margin:10px auto;
padding:10px;
width:90%;
border-radius:8px;
border:1px solid #ccc;
}

/* BOTON */
button{
margin-top:10px;
padding:10px;
width:95%;
background:#7b2ff7;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#5a1fd1;
}
</style>
</head>

<body>

<div class="box">

<!-- LOGO -->
<img src="sofia.img.png" class="logo">

<h2>SofSport</h2>
<p>Iniciar sesión</p>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

</div>

<script>
function login(){
let user=document.getElementById("user").value;

/* GUARDA SESION */
localStorage.setItem("sesion",user||"admin");

/* IR AL DASHBOARD */
window.location="dashboard.html";
}
</script>

</body>
</html>
